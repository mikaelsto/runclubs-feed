name: Scrape löparresor → Sheet

# Scrapes running-trip listing sites and upserts rows into the
# "Loparresor" tab of the Google Sheet.
# amandahultin/runclubs then reads that Sheet to generate loparresor.html.

on:
  schedule:
    - cron: "0 7 * * 0"    # Every Sunday at 07:00 UTC
  workflow_dispatch:         # Manual run from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape sites → Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LOPARRESOR_SHEET_ID: ${{ secrets.LOPARRESOR_SHEET_ID }}
        run: python -m src.scrape_loparresor
